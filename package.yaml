name: ddx
version: 0.4.7
description: DDx default library — prompts, personas, MCP server configs, environment templates, and skills
type: plugin
source: https://github.com/DocumentDrivenDX/ddx-library
api_version: "1"
keywords:
  - library
  - prompts
  - personas
  - mcp
  - default
  - skills
install:
  root:
    source: .
    target: .ddx/plugins/ddx
  skills:
    - source: skills/
      target: .agents/skills/
    - source: skills/
      target: .claude/skills/
